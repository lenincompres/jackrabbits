<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="../lib/DOM.js"></script>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../jr-fonts.css" />
    <style>
      body {
        max-width: 50em;
      }
      body > main {
        padding: 1em;
        background-color: var(--home);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: left;
      }
      * {
        box-sizing: border-box;
      }
      .interline {
        display: flex;
        justify-content: left;
      }
      .interline > h2 {
        margin: 0.2em;
        font-size: 1.2em;
        width: 2em;
      }
      .interline > p {
        font-size: 0.9em;
        margin: 0.1em 0.2em;
        width: -webkit-fill-available;
      }
      .interword {
        display: flex;
        flex-direction: row;
        font-family: monospace;
        text-align: center;
        padding: 0.5em 0;
      }
      .persists::after,
      .persisted::before {
        content: "↑";
        vertical-align: text-top;
        color: black;
        display: block;
        position: absolute;
        left: 0;
        bottom: -1em;
        width: 100%;
        height: 1em;
        line-height: 1.15em;
        z-index: 9999;
      }
      .persisted::before {
        content: "↓";
        vertical-align: bottom;
        bottom: auto;
        top: -1em;
      }
      .block {
        position: relative;
        display: inline-block;
        text-align: center;
        width: 2em;
        height: 2em;
        font-size: 1em;
        vertical-align: middle;
        line-height: 1.8em;
        border-width: 2px;
        border-style: solid;
        border-color: transparent;
      }
      .cell {
        background-color: white;
        color: green;
        border-color: black;
        width: 2em;
        height: 2em;
      }
      .cell:focus-visible {
        outline: none !important;
      }
      .moveDown {
        border-bottom-style: dashed !important;
      }
      .moveUp {
        border-top-style: dashed !important;
      }
      @media (width < 45rem) {
        .interline {
          flex-wrap: wrap;
        }
        .interline > h2 {
          width: 1.25em;
        }
        .interline > p {
          width: calc(100% - 3em);
        }
        .interword {
          margin: 0.5em auto 0.7em;
          font-size: 0.9em;
        }
        body > main {
          padding: 1em 0.5em;
          max-width: 100vw;
        }
      }
    </style>
  </head>
  <body>
    <script src="main.js" type="module"></script>
  </body>
</html>
